<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse — Garmin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#fff;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:rgba(255,255,255,0.02)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.spinner{width:40px;height:40px;border:3px solid rgba(34,211,238,0.2);border-top-color:#22d3ee;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div style="color:rgba(255,255,255,0.5);font-size:13px">Loading Garmin data...</div>
  </div>
</div>

<script type="text/babel">
const {useState, useEffect, useMemo, useCallback} = React;
const {LineChart, Line, AreaChart, Area, BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid, Cell, PieChart, Pie, ScatterChart, Scatter, ReferenceLine} = Recharts;

const SPORT_COLORS = {running:"#22d3ee",cycling:"#a78bfa",hiking:"#4ade80",indoor_climbing:"#fb923c",walking:"#f9a8d4"};
const SPORT_ICONS = {running:"🏃",cycling:"🚴",hiking:"⛰️",indoor_climbing:"🧗",walking:"🚶"};
const SPORT_LABELS = {running:"Running",cycling:"Cycling",hiking:"Hiking",indoor_climbing:"Climbing",walking:"Walking"};

const DarkTooltip = ({active,payload,label}) => {
  if(!active||!payload?.length) return null;
  return <div style={{background:"rgba(15,15,25,0.95)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#e0e0e0",backdropFilter:"blur(10px)"}}>
    <div style={{fontWeight:600,marginBottom:4,color:"#fff"}}>{label}</div>
    {payload.map((p,i) => <div key={i} style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
      <span style={{width:8,height:8,borderRadius:"50%",background:p.color,display:"inline-block"}}/>
      <span style={{opacity:0.7}}>{p.name}:</span>
      <span style={{fontWeight:600}}>{typeof p.value==="number"?p.value.toLocaleString():p.value}</span>
    </div>)}
  </div>;
};

const Card = ({children,span=1,style={}}) => <div style={{
  gridColumn:`span ${span}`,background:"linear-gradient(135deg,rgba(25,25,40,0.8),rgba(15,15,30,0.9))",
  border:"1px solid rgba(255,255,255,0.06)",borderRadius:16,padding:"20px 22px",
  backdropFilter:"blur(20px)",position:"relative",overflow:"hidden",...style
}}>
  <div style={{position:"absolute",top:0,left:0,right:0,height:1,background:"linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent)"}}/>
  {children}
</div>;

const CardTitle = ({children,sub}) => <div style={{marginBottom:14}}>
  <div style={{fontSize:13,fontWeight:600,color:"rgba(255,255,255,0.9)",letterSpacing:0.3,textTransform:"uppercase"}}>{children}</div>
  {sub && <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2}}>{sub}</div>}
</div>;

const Ring = ({value,max=100,size=72,stroke=6,color="#22d3ee",label}) => {
  const r=(size-stroke)/2, circ=2*Math.PI*r, pct=Math.min(value/max,1);
  return <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"/>
    </svg>
    <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <span style={{fontSize:16,fontWeight:700,color:"#fff"}}>{Math.round(value)}</span>
      {label && <span style={{fontSize:9,color:"rgba(255,255,255,0.4)",textTransform:"uppercase"}}>{label}</span>}
    </div>
  </div>;
};

const Pill = ({active,onClick,children,color}) => <button onClick={onClick} style={{
  padding:"6px 14px",borderRadius:20,border:"1px solid",
  borderColor:active?(color||"rgba(34,211,238,0.5)"):"rgba(255,255,255,0.08)",
  background:active?(color?color+"18":"rgba(34,211,238,0.1)"):"transparent",
  color:active?"#fff":"rgba(255,255,255,0.45)",fontSize:12,fontWeight:500,cursor:"pointer",whiteSpace:"nowrap"
}}>{children}</button>;

const Badge = ({children,color="#22d3ee"}) => <span style={{
  display:"inline-flex",alignItems:"center",gap:4,padding:"3px 10px",
  borderRadius:12,background:color+"15",color,fontSize:11,fontWeight:600
}}>{children}</span>;

const InsightItem = ({icon,text}) => <div style={{
  display:"flex",gap:10,alignItems:"flex-start",padding:"10px 12px",
  borderRadius:10,background:"rgba(255,255,255,0.02)",marginBottom:6,
  border:"1px solid rgba(255,255,255,0.03)"
}}>
  <span style={{fontSize:16,flexShrink:0,marginTop:1}}>{icon}</span>
  <span style={{fontSize:12,color:"rgba(255,255,255,0.7)",lineHeight:1.5}}>{text}</span>
</div>;

function Dashboard() {
  const [raw, setRaw] = useState(null);
  const [error, setError] = useState(null);
  const [dateRange, setDateRange] = useState("all");
  const [selectedTypes, setSelectedTypes] = useState(new Set(["running","cycling","hiking","indoor_climbing","walking"]));
  const [tab, setTab] = useState("overview");

  useEffect(() => {
    fetch("/api/data").then(r=>r.json()).then(d=>{
      // Parse numeric fields
      d.activities = (d.activities||[]).map(a=>({...a,
        distance_km:a.distance_km?+a.distance_km:null,duration_min:+a.duration_min,
        avg_hr:+a.avg_hr,max_hr:+a.max_hr,calories:+a.calories,
        elevation_gain_m:a.elevation_gain_m?+a.elevation_gain_m:null,
        training_effect_aerobic:+a.training_effect_aerobic
      }));
      d.daily_summary = (d.daily_summary||[]).map(r=>({...r,steps:+r.steps,total_calories:+r.total_calories,
        active_calories:+r.active_calories,distance_km:+r.distance_km,floors_climbed:+r.floors_climbed,
        moderate_intensity_minutes:+r.moderate_intensity_minutes,vigorous_intensity_minutes:+r.vigorous_intensity_minutes,
        sedentary_minutes:+r.sedentary_minutes,activity_count:+r.activity_count}));
      d.sleep = (d.sleep||[]).map(r=>({...r,total_sleep_min:+r.total_sleep_minutes,
        deep_min:+r.deep_sleep_minutes,light_min:+r.light_sleep_minutes,
        rem_min:+r.rem_sleep_minutes,awake_min:+r.awake_minutes,
        sleep_score:+r.sleep_score,avg_sleep_hr:+r.avg_sleep_hr,restless:+r.restless_moments}));
      d.heart_rate_hrv = (d.heart_rate_hrv||[]).map(r=>({...r,resting_hr:+r.resting_hr,
        min_hr:+r.min_hr,max_hr:+r.max_hr,hrv_rmssd:+r.hrv_overnight_rmssd,
        hrv_status:r.hrv_status,vo2max:r.vo2max_running?+r.vo2max_running:null}));
      d.stress_body_battery = (d.stress_body_battery||[]).map(r=>({...r,
        avg_stress:+r.avg_stress_level,max_stress:+r.max_stress_level,
        bb_high:+r.body_battery_highest,bb_low:+r.body_battery_lowest,
        bb_morning:+r.body_battery_morning,bb_end:+r.body_battery_end_of_day,
        stress_qualifier:r.stress_qualifier}));
      setRaw(d);
    }).catch(e=>setError(e.message));
  }, []);

  const toggleType = t => {
    const s = new Set(selectedTypes);
    s.has(t)?s.delete(t):s.add(t);
    if(s.size>0) setSelectedTypes(s);
  };

  const filtered = useMemo(() => {
    if(!raw) return null;
    const now = new Date("2026-03-07");
    const bounds = {
      "7d": new Date(now-7*864e5), "30d": new Date(now-30*864e5),
      "90d": new Date(now-90*864e5), "6m": new Date(now-180*864e5),
      "all": new Date("2025-04-01")
    };
    const start = bounds[dateRange] || bounds.all;
    const inRange = ds => new Date(ds) >= start && new Date(ds) <= now;

    return {
      activities: raw.activities.filter(a=>inRange(a.date)&&selectedTypes.has(a.activity_type)),
      daily: raw.daily_summary.filter(d=>inRange(d.date)),
      sleep: raw.sleep.filter(s=>inRange(s.date)),
      hr: raw.heart_rate_hrv.filter(h=>inRange(h.date)),
      stress: raw.stress_body_battery.filter(s=>inRange(s.date)),
    };
  }, [raw, dateRange, selectedTypes]);

  const kpis = useMemo(() => {
    if(!filtered) return {};
    const f = filtered;
    const avg = (arr,fn) => arr.length ? Math.round(arr.reduce((s,x)=>s+fn(x),0)/arr.length) : 0;
    return {
      avgSteps: avg(f.daily, d=>d.steps),
      totalActivities: f.activities.length,
      totalDistance: +f.activities.reduce((s,a)=>s+(a.distance_km||0),0).toFixed(1),
      avgSleepScore: avg(f.sleep, s=>s.sleep_score),
      avgSleep: avg(f.sleep, s=>s.total_sleep_min),
      avgRHR: avg(f.hr, h=>h.resting_hr),
      avgHRV: avg(f.hr, h=>h.hrv_rmssd),
      avgStress: avg(f.stress, s=>s.avg_stress),
      avgBB: avg(f.stress, s=>s.bb_morning),
      avgVO2: f.hr.filter(h=>h.vo2max).length ? +(f.hr.filter(h=>h.vo2max).reduce((s,h)=>s+h.vo2max,0)/f.hr.filter(h=>h.vo2max).length).toFixed(1) : 0,
      totalElevation: f.activities.reduce((s,a)=>s+(a.elevation_gain_m||0),0),
    };
  }, [filtered]);

  // Insights
  const insights = useMemo(() => {
    if(!filtered) return [];
    const f = filtered, r = [];
    const best = [...f.sleep].sort((a,b)=>b.sleep_score-a.sleep_score)[0];
    if(best) r.push({icon:"🌙",text:`Best sleep: ${best.sleep_score} on ${best.date}`});
    const worst = [...f.sleep].sort((a,b)=>a.sleep_score-b.sleep_score)[0];
    if(worst) r.push({icon:"😴",text:`Worst sleep: ${worst.sleep_score} on ${worst.date}`});
    const topSteps = [...f.daily].sort((a,b)=>b.steps-a.steps)[0];
    if(topSteps) r.push({icon:"🔥",text:`Most steps: ${topSteps.steps.toLocaleString()} on ${topSteps.date}`});
    const longest = [...f.activities].sort((a,b)=>b.duration_min-a.duration_min)[0];
    if(longest) r.push({icon:"⏱️",text:`Longest: ${Math.round(longest.duration_min)}min ${longest.activity_type} on ${longest.date}`});
    const peakHR = [...f.activities].sort((a,b)=>b.max_hr-a.max_hr)[0];
    if(peakHR) r.push({icon:"💓",text:`Peak HR: ${peakHR.max_hr}bpm during ${peakHR.activity_name} on ${peakHR.date}`});
    const topElev = [...f.activities].filter(a=>a.elevation_gain_m).sort((a,b)=>b.elevation_gain_m-a.elevation_gain_m)[0];
    if(topElev) r.push({icon:"🏔️",text:`Highest climb: ${topElev.elevation_gain_m}m on ${topElev.date}`});
    const highStress = f.stress.filter(s=>s.avg_stress>50);
    r.push({icon:"🧠",text:`${highStress.length} high-stress days in period`});
    r.push({icon:"🔋",text:`Avg morning Body Battery: ${kpis.avgBB} — ${kpis.avgBB>70?"well recovered":kpis.avgBB>50?"moderate":"needs rest"}`});
    r.push({icon:"🫁",text:`VO₂max: ${kpis.avgVO2} ml/kg/min — ${kpis.avgVO2>44?"excellent":kpis.avgVO2>40?"good":"fair"}`});
    const sportCounts = {};
    f.activities.forEach(a=>{sportCounts[a.activity_type]=(sportCounts[a.activity_type]||0)+1});
    const top = Object.entries(sportCounts).sort((a,b)=>b[1]-a[1])[0];
    if(top) r.push({icon:SPORT_ICONS[top[0]],text:`Most frequent: ${SPORT_LABELS[top[0]]} (${top[1]} sessions)`});
    r.push({icon:"⛰️",text:`Total elevation: ${kpis.totalElevation.toLocaleString()}m — ${(kpis.totalElevation/8849).toFixed(1)}x Everest`});
    const totalBurn = f.activities.reduce((s,a)=>s+a.calories,0);
    r.push({icon:"🔥",text:`${totalBurn.toLocaleString()} total activity calories across ${f.activities.length} sessions`});
    const sickDays = f.daily.filter(d=>d.steps<3000);
    if(sickDays.length) r.push({icon:"🤒",text:`${sickDays.length} very low days (<3k steps) — illness or rest`});
    let streak=0,maxS=0; f.daily.forEach(d=>{if(d.activity_count>0){streak++;maxS=Math.max(maxS,streak)}else streak=0});
    r.push({icon:"🔥",text:`Longest activity streak: ${maxS} consecutive days`});
    return r;
  }, [filtered, kpis]);

  // Chart data
  const weeklyData = useMemo(() => {
    if(!filtered) return [];
    const weeks = {};
    filtered.daily.forEach(d => {
      const dt = new Date(d.date), ws = new Date(dt);
      ws.setDate(dt.getDate()-dt.getDay());
      const key = ws.toISOString().slice(0,10);
      if(!weeks[key]) weeks[key]={week:key,steps:0,count:0,acts:0};
      weeks[key].steps+=d.steps; weeks[key].count++; weeks[key].acts+=d.activity_count;
    });
    return Object.values(weeks).map(w=>({label:w.week.slice(5),avgSteps:Math.round(w.steps/w.count),activities:w.acts}));
  }, [filtered]);

  const actByType = useMemo(() => {
    if(!filtered) return [];
    const c = {};
    filtered.activities.forEach(a=>{c[a.activity_type]=(c[a.activity_type]||0)+1});
    return Object.entries(c).map(([k,v])=>({name:SPORT_LABELS[k],value:v,color:SPORT_COLORS[k]}));
  }, [filtered]);

  const monthlyTrend = useMemo(() => {
    if(!filtered) return [];
    const m = {};
    filtered.hr.forEach(h=>{
      const mo = h.date.slice(0,7);
      if(!m[mo]) m[mo]={month:mo,rhr:[],hrv:[],sleep:[],stress:[]};
      m[mo].rhr.push(h.resting_hr); m[mo].hrv.push(h.hrv_rmssd);
    });
    filtered.sleep.forEach(s=>{const mo=s.date.slice(0,7);if(m[mo])m[mo].sleep.push(s.sleep_score)});
    filtered.stress.forEach(s=>{const mo=s.date.slice(0,7);if(m[mo])m[mo].stress.push(s.avg_stress)});
    return Object.values(m).map(v=>({
      label:new Date(v.month+"-15").toLocaleString("en",{month:"short",year:"2-digit"}),
      rhr:Math.round(v.rhr.reduce((a,b)=>a+b,0)/v.rhr.length),
      hrv:Math.round(v.hrv.reduce((a,b)=>a+b,0)/v.hrv.length),
      sleep:v.sleep.length?Math.round(v.sleep.reduce((a,b)=>a+b,0)/v.sleep.length):0,
      stress:v.stress.length?Math.round(v.stress.reduce((a,b)=>a+b,0)/v.stress.length):0,
    }));
  }, [filtered]);

  if(error) return <div style={{padding:40,textAlign:"center"}}><h2 style={{color:"#f87171"}}>Error loading data</h2><p style={{color:"rgba(255,255,255,0.5)",marginTop:8}}>{error}</p></div>;
  if(!filtered) return <div className="loading-screen"><div className="spinner"></div><div style={{color:"rgba(255,255,255,0.5)",fontSize:13}}>Loading Garmin data...</div></div>;

  return <div style={{padding:"24px 28px",maxWidth:1400,margin:"0 auto"}}>
    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
      <div>
        <h1 style={{fontSize:26,fontWeight:700,margin:0,background:"linear-gradient(135deg,#22d3ee,#a78bfa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Pulse</h1>
        <p style={{fontSize:12,color:"rgba(255,255,255,0.35)",marginTop:4,letterSpacing:1,textTransform:"uppercase"}}>Garmin Wearable Analytics</p>
      </div>
      <div style={{display:"flex",gap:8}}><Badge color="#4ade80">{filtered.daily.length} days</Badge><Badge color="#a78bfa">{filtered.activities.length} activities</Badge></div>
    </div>

    {/* Filters */}
    <Card style={{marginBottom:20,padding:"16px 20px"}}>
      <div style={{display:"flex",flexWrap:"wrap",gap:16,alignItems:"center"}}>
        <div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Period</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {[["7d","7 Days"],["30d","30 Days"],["90d","90 Days"],["6m","6 Months"],["all","All Time"]].map(([k,l])=>
              <Pill key={k} active={dateRange===k} onClick={()=>setDateRange(k)}>{l}</Pill>
            )}
          </div>
        </div>
        <div style={{width:1,height:36,background:"rgba(255,255,255,0.06)"}}/>
        <div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Sports</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {Object.entries(SPORT_LABELS).map(([k,l])=>
              <Pill key={k} active={selectedTypes.has(k)} onClick={()=>toggleType(k)} color={SPORT_COLORS[k]}>{SPORT_ICONS[k]} {l}</Pill>
            )}
          </div>
        </div>
      </div>
    </Card>

    {/* Tabs */}
    <div style={{display:"flex",gap:2,marginBottom:20}}>
      {[["overview","Overview"],["activities","Activities"],["sleep","Sleep & Recovery"],["heart","Heart & Fitness"],["stress","Stress & Energy"]].map(([k,l])=>
        <button key={k} onClick={()=>setTab(k)} style={{
          padding:"10px 20px",borderRadius:10,border:"none",
          background:tab===k?"rgba(34,211,238,0.12)":"transparent",
          color:tab===k?"#22d3ee":"rgba(255,255,255,0.4)",fontSize:13,fontWeight:600,cursor:"pointer",
          borderBottom:tab===k?"2px solid #22d3ee":"2px solid transparent"
        }}>{l}</button>
      )}
    </div>

    {/* OVERVIEW */}
    {tab==="overview" && <>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:20}}>
        <Card><div style={{display:"flex",alignItems:"center",gap:14}}>
          <Ring value={kpis.avgSteps} max={12000} color="#22d3ee" label="steps"/>
          <div><div style={{fontSize:11,color:"rgba(255,255,255,0.4)",textTransform:"uppercase"}}>Avg Daily Steps</div>
          <div style={{fontSize:28,fontWeight:700,color:"#22d3ee"}}>{kpis.avgSteps.toLocaleString()}</div></div>
        </div></Card>
        <Card><div style={{display:"flex",alignItems:"center",gap:14}}>
          <Ring value={kpis.avgSleepScore} max={100} color="#a78bfa" label="score"/>
          <div><div style={{fontSize:11,color:"rgba(255,255,255,0.4)",textTransform:"uppercase"}}>Avg Sleep Score</div>
          <div style={{fontSize:28,fontWeight:700,color:"#a78bfa"}}>{kpis.avgSleepScore}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>{Math.floor(kpis.avgSleep/60)}h {kpis.avgSleep%60}m avg</div></div>
        </div></Card>
        <Card><div style={{display:"flex",alignItems:"center",gap:14}}>
          <Ring value={100-kpis.avgStress} max={100} color={kpis.avgStress<30?"#4ade80":"#fbbf24"} label="calm"/>
          <div><div style={{fontSize:11,color:"rgba(255,255,255,0.4)",textTransform:"uppercase"}}>Avg Stress</div>
          <div style={{fontSize:28,fontWeight:700,color:kpis.avgStress<35?"#4ade80":"#fbbf24"}}>{kpis.avgStress}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>Body Battery: {kpis.avgBB}</div></div>
        </div></Card>
        <Card><div style={{display:"flex",alignItems:"center",gap:14}}>
          <Ring value={kpis.avgRHR} max={80} color="#f87171" label="bpm"/>
          <div><div style={{fontSize:11,color:"rgba(255,255,255,0.4)",textTransform:"uppercase"}}>Resting HR</div>
          <div style={{fontSize:28,fontWeight:700,color:"#f87171"}}>{kpis.avgRHR}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>HRV: {kpis.avgHRV}ms</div></div>
        </div></Card>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:20}}>
        {[{v:kpis.totalActivities,u:"",l:"Activities",c:"#fb923c"},{v:kpis.totalDistance.toLocaleString(),u:"km",l:"Distance",c:"#4ade80"},
          {v:kpis.avgHRV,u:"ms",l:"Avg HRV",c:"#22d3ee"},{v:kpis.avgVO2,u:"",l:"VO₂ Max",c:"#a78bfa"}].map((k,i)=>
          <Card key={i} style={{textAlign:"center",padding:"16px 10px"}}>
            <div style={{fontSize:26,fontWeight:700,color:k.c}}>{k.v}<span style={{fontSize:13,fontWeight:400,opacity:0.6,marginLeft:2}}>{k.u}</span></div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",marginTop:4,textTransform:"uppercase",letterSpacing:0.5}}>{k.l}</div>
          </Card>
        )}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:20}}>
        <Card span={2}>
          <CardTitle sub="Weekly average">Steps Trend</CardTitle>
          <ResponsiveContainer width="100%" height={200}>
            <AreaChart data={weeklyData}>
              <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#22d3ee" stopOpacity={0.3}/><stop offset="95%" stopColor="#22d3ee" stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)"/>
              <XAxis dataKey="label" tick={{fill:"rgba(255,255,255,0.3)",fontSize:10}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fill:"rgba(255,255,255,0.3)",fontSize:10}} axisLine={false} tickLine={false}/>
              <Tooltip content={<DarkTooltip/>}/>
              <Area type="monotone" dataKey="avgSteps" name="Avg Steps" stroke="#22d3ee" fill="url(#sg)" strokeWidth={2}/>
            </AreaChart>
          </ResponsiveContainer>
        </Card>
        <Card>
          <CardTitle>Sport Split</CardTitle>
          <ResponsiveContainer width="100%" height={180}>
            <PieChart><Pie data={actByType} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={40} outerRadius={70} paddingAngle={3}>
              {actByType.map((e,i)=><Cell key={i} fill={e.color}/>)}
            </Pie><Tooltip content={<DarkTooltip/>}/></PieChart>
          </ResponsiveContainer>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>
            {actByType.map(a=><span key={a.name} style={{fontSize:10,color:a.color,display:"flex",alignItems:"center",gap:4}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:a.color,display:"inline-block"}}/>{a.name} ({a.value})
            </span>)}
          </div>
        </Card>

        <Card span={3}>
          <CardTitle sub="Monthly averages: RHR, HRV, Sleep Score">Fitness Progression</CardTitle>
          <ResponsiveContainer width="100%" height={200}>
            <LineChart data={monthlyTrend}>
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)"/>
              <XAxis dataKey="label" tick={{fill:"rgba(255,255,255,0.3)",fontSize:10}} axisLine={false} tickLine={false}/>
              <YAxis yAxisId="l" tick={{fill:"rgba(255,255,255,0.3)",fontSize:10}} axisLine={false} tickLine={false}/>
              <YAxis yAxisId="r" orientation="right" tick={{fill:"rgba(255,255,255,0.3)",fontSize:10}} axisLine={false} tickLine={false}/>
              <Tooltip content={<DarkTooltip/>}/>
              <Line yAxisId="l" type="monotone" dataKey="rhr" name="Resting HR" stroke="#f87171" strokeWidth={2} dot={false}/>
              <Line yAxisId="l" type="monotone" dataKey="hrv" name="HRV" stroke="#22d3ee" strokeWidth={2} dot={false}/>
              <Line yAxisId="r" type="monotone" dataKey="sleep" name="Sleep Score" stroke="#a78bfa" strokeWidth={2} dot={false}/>
            </LineChart>
          </ResponsiveContainer>
        </Card>
      </div>

      <Card style={{marginBottom:20}}>
        <CardTitle sub={`${insights.length} observations`}>💡 Insights</CardTitle>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
          {insights.map((ins,i)=><InsightItem key={i} icon={ins.icon} text={ins.text}/>)}
        </div>
      </Card>
    </>}

    {/* ACTIVITIES */}
    {tab==="activities" && <>
      <Card style={{marginBottom:14}}>
        <CardTitle sub="Last 60 activities by calories burned">Activity Timeline</CardTitle>
        <ResponsiveContainer width="100%" height={220}>
          <BarChart data={filtered.activities.slice(-60).map(a=>({date:a.date.slice(5),calories:a.calories,type:a.activity_type}))}>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)"/>
            <XAxis dataKey="date" tick={{fill:"rgba(255,255,255,0.3)",fontSize:9}} axisLine={false} tickLine={false} interval={4}/>
            <YAxis tick={{fill:"rgba(255,255,255,0.3)",fontSize:10}} axisLine={false} tickLine={false}/>
            <Tooltip content={<DarkTooltip/>}/>
            <Bar dataKey="calories" name="Calories" radius={[4,4,0,0]}>
              {filtered.activities.slice(-60).map((a,i)=><Cell key={i} fill={SPORT_COLORS[a.activity_type]} fillOpacity={0.8}/>)}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      </Card>
      <Card>
        <CardTitle>Activity Log (last 20)</CardTitle>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr style={{borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
              {["Date","Type","Duration","Distance","Avg HR","Max HR","Calories","Elev."].map(h=>
                <th key={h} style={{padding:"8px 10px",textAlign:"left",color:"rgba(255,255,255,0.4)",fontWeight:500,fontSize:10,textTransform:"uppercase"}}>{h}</th>
              )}
            </tr></thead>
            <tbody>{[...filtered.activities].reverse().slice(0,20).map(a=>
              <tr key={a.activity_id} style={{borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                <td style={{padding:"8px 10px",color:"rgba(255,255,255,0.6)"}}>{a.date}</td>
                <td style={{padding:"8px 10px",color:SPORT_COLORS[a.activity_type]}}>{SPORT_ICONS[a.activity_type]} {SPORT_LABELS[a.activity_type]}</td>
                <td style={{padding:"8px 10px",fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>{Math.round(a.duration_min)}m</td>
                <td style={{padding:"8px 10px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#4ade80"}}>{a.distance_km?`${a.distance_km}km`:"—"}</td>
                <td style={{padding:"8px 10px",fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>{a.avg_hr}</td>
                <td style={{padding:"8px 10px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:a.max_hr>175?"#f87171":"#fff"}}>{a.max_hr}</td>
                <td style={{padding:"8px 10px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#fb923c"}}>{a.calories}</td>
                <td style={{padding:"8px 10px",fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>{a.elevation_gain_m?`${a.elevation_gain_m}m`:"—"}</td>
              </tr>
            )}</tbody>
          </table>
        </div>
      </Card>
    </>}

    {/* SLEEP */}
    {tab==="sleep" && <>
      <Card style={{marginBottom:14}}>
        <CardTitle sub="Last 60 nights">Sleep Score Trend</CardTitle>
        <ResponsiveContainer width="100%" height={220}>
          <AreaChart data={filtered.sleep.slice(-60).map(s=>({date:s.date.slice(5),score:s.sleep_score,hours:+(s.total_sleep_min/60).toFixed(1)}))}>
            <defs><linearGradient id="slg" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#a78bfa" stopOpacity={0.3}/><stop offset="95%" stopColor="#a78bfa" stopOpacity={0}/></linearGradient></defs>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)"/>
            <XAxis dataKey="date" tick={{fill:"rgba(255,255,255,0.3)",fontSize:9}} axisLine={false} tickLine={false} interval={5}/>
            <YAxis domain={[40,100]} tick={{fill:"rgba(255,255,255,0.3)",fontSize:10}} axisLine={false} tickLine={false}/>
            <Tooltip content={<DarkTooltip/>}/>
            <ReferenceLine y={kpis.avgSleepScore} stroke="rgba(167,139,250,0.3)" strokeDasharray="5 5"/>
            <Area type="monotone" dataKey="score" name="Sleep Score" stroke="#a78bfa" fill="url(#slg)" strokeWidth={2}/>
          </AreaChart>
        </ResponsiveContainer>
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:14}}>
        <Card>
          <CardTitle sub="Sleep vs Stress correlation">Sleep vs Stress</CardTitle>
          <ResponsiveContainer width="100%" height={200}>
            <ScatterChart>
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)"/>
              <XAxis dataKey="stress" name="Stress" tick={{fill:"rgba(255,255,255,0.3)",fontSize:10}} axisLine={false} tickLine={false}/>
              <YAxis dataKey="sleep" name="Sleep Score" tick={{fill:"rgba(255,255,255,0.3)",fontSize:10}} axisLine={false} tickLine={false}/>
              <Tooltip content={<DarkTooltip/>}/>
              <Scatter name="Days" data={filtered.sleep.map(s=>{const st=filtered.stress.find(x=>x.date===s.date);return st?{sleep:s.sleep_score,stress:st.avg_stress}:null}).filter(Boolean)} fill="#a78bfa" fillOpacity={0.4}/>
            </ScatterChart>
          </ResponsiveContainer>
        </Card>
        <Card>
          <CardTitle>Avg Sleep Stages</CardTitle>
          {(()=>{
            const avg=(k)=>filtered.sleep.length?Math.round(filtered.sleep.reduce((s,d)=>s+d[k],0)/filtered.sleep.length):0;
            const stages=[{name:"Deep",val:avg("deep_min"),color:"#6366f1"},{name:"Light",val:avg("light_min"),color:"#22d3ee"},
              {name:"REM",val:avg("rem_min"),color:"#a78bfa"},{name:"Awake",val:avg("awake_min"),color:"#f87171"}];
            const total = stages.reduce((s,x)=>s+x.val,0)||1;
            return stages.map(s=><div key={s.name} style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:12,color:s.color}}>{s.name}</span>
                <span style={{fontSize:12,color:"rgba(255,255,255,0.5)",fontFamily:"'JetBrains Mono',monospace"}}>{s.val}m ({Math.round(s.val/total*100)}%)</span>
              </div>
              <div style={{height:6,borderRadius:3,background:"rgba(255,255,255,0.05)"}}>
                <div style={{height:"100%",borderRadius:3,background:s.color,width:`${s.val/total*100}%`,opacity:0.7}}/>
              </div>
            </div>);
          })()}
        </Card>
      </div>
    </>}

    {/* HEART */}
    {tab==="heart" && <>
      <Card style={{marginBottom:14}}>
        <CardTitle sub="Daily resting heart rate">RHR Trend</CardTitle>
        <ResponsiveContainer width="100%" height={220}>
          <LineChart data={filtered.hr.map(h=>({date:h.date.slice(5),rhr:h.resting_hr}))}>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)"/>
            <XAxis dataKey="date" tick={{fill:"rgba(255,255,255,0.3)",fontSize:9}} axisLine={false} tickLine={false} interval={Math.floor(filtered.hr.length/12)}/>
            <YAxis domain={["dataMin-3","dataMax+3"]} tick={{fill:"rgba(255,255,255,0.3)",fontSize:10}} axisLine={false} tickLine={false}/>
            <Tooltip content={<DarkTooltip/>}/>
            <Line type="monotone" dataKey="rhr" name="Resting HR" stroke="#f87171" strokeWidth={1.5} dot={false}/>
          </LineChart>
        </ResponsiveContainer>
      </Card>
      <Card>
        <CardTitle sub="HRV overnight — higher is better">HRV Trend</CardTitle>
        <ResponsiveContainer width="100%" height={200}>
          <AreaChart data={filtered.hr.map(h=>({date:h.date.slice(5),hrv:h.hrv_rmssd}))}>
            <defs><linearGradient id="hg" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#22d3ee" stopOpacity={0.3}/><stop offset="95%" stopColor="#22d3ee" stopOpacity={0}/></linearGradient></defs>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)"/>
            <XAxis dataKey="date" tick={{fill:"rgba(255,255,255,0.3)",fontSize:9}} axisLine={false} tickLine={false} interval={Math.floor(filtered.hr.length/12)}/>
            <YAxis tick={{fill:"rgba(255,255,255,0.3)",fontSize:10}} axisLine={false} tickLine={false}/>
            <Tooltip content={<DarkTooltip/>}/>
            <Area type="monotone" dataKey="hrv" name="HRV (RMSSD)" stroke="#22d3ee" fill="url(#hg)" strokeWidth={2}/>
          </AreaChart>
        </ResponsiveContainer>
      </Card>
    </>}

    {/* STRESS */}
    {tab==="stress" && <>
      <Card style={{marginBottom:14}}>
        <CardTitle sub="Last 60 days">Stress Level</CardTitle>
        <ResponsiveContainer width="100%" height={220}>
          <AreaChart data={filtered.stress.slice(-60).map(s=>({date:s.date.slice(5),avg:s.avg_stress}))}>
            <defs><linearGradient id="stg" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#fbbf24" stopOpacity={0.3}/><stop offset="95%" stopColor="#fbbf24" stopOpacity={0}/></linearGradient></defs>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)"/>
            <XAxis dataKey="date" tick={{fill:"rgba(255,255,255,0.3)",fontSize:9}} axisLine={false} tickLine={false} interval={5}/>
            <YAxis domain={[0,80]} tick={{fill:"rgba(255,255,255,0.3)",fontSize:10}} axisLine={false} tickLine={false}/>
            <Tooltip content={<DarkTooltip/>}/>
            <ReferenceLine y={40} stroke="rgba(251,191,36,0.2)" strokeDasharray="5 5"/>
            <Area type="monotone" dataKey="avg" name="Avg Stress" stroke="#fbbf24" fill="url(#stg)" strokeWidth={2}/>
          </AreaChart>
        </ResponsiveContainer>
      </Card>
      <Card>
        <CardTitle sub="Morning charge vs end-of-day">Body Battery</CardTitle>
        <ResponsiveContainer width="100%" height={200}>
          <AreaChart data={filtered.stress.slice(-45).map(s=>({date:s.date.slice(5),morning:s.bb_morning,end:s.bb_end}))}>
            <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#4ade80" stopOpacity={0.2}/><stop offset="95%" stopColor="#4ade80" stopOpacity={0}/></linearGradient></defs>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)"/>
            <XAxis dataKey="date" tick={{fill:"rgba(255,255,255,0.3)",fontSize:9}} axisLine={false} tickLine={false}/>
            <YAxis domain={[0,100]} tick={{fill:"rgba(255,255,255,0.3)",fontSize:10}} axisLine={false} tickLine={false}/>
            <Tooltip content={<DarkTooltip/>}/>
            <Area type="monotone" dataKey="morning" name="Morning BB" stroke="#4ade80" fill="url(#bg)" strokeWidth={2}/>
            <Line type="monotone" dataKey="end" name="End of Day" stroke="#f87171" strokeWidth={1.5} dot={false} strokeDasharray="4 2"/>
          </AreaChart>
        </ResponsiveContainer>
      </Card>
    </>}

    <div style={{textAlign:"center",padding:"32px 0 16px",color:"rgba(255,255,255,0.15)",fontSize:11}}>
      Pulse · Garmin Wearable Analytics · {filtered.daily.length} days
    </div>
  </div>;
}

ReactDOM.render(<Dashboard/>, document.getElementById("root"));
</script>
</body>
</html>
